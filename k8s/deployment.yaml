apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-nginx
  namespace: project1
  labels:
    app: hello-nginx

spec:
  replicas: 1

  selector:
    matchLabels:
      app: hello-nginx

  template:
    metadata:
      labels:
        app: hello-nginx

    spec:

      tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "project1"
        effect: "NoSchedule"

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: environment
                operator: In
                values:
                - production

      containers:
      - name: nginx

        image: shaktimerry4/hello-world-nginx:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 80

        envFrom:
        - configMapRef:
            name: app-config

        - secretRef:
            name: app-secret

        volumeMounts:
        - name: nginx-storage
          mountPath: /usr/share/nginx/html/logs

      volumes:
      - name: nginx-storage
        persistentVolumeClaim:
          claimName: nginx-pvc

